<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexa Messenger - Premium Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
/* =====================================================
   NEXA MESSENGER — PREMIUM EDITION
   DARK BLUE + BLACK LUXURY THEME WITH GLASS-MORPHISM
   ===================================================== */

*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  /* Premium Dark Blue + Black */
  --bg-0:        #0a0e17;
  --bg-1:        #0f1419;
  --bg-2:        #151b27;
  --bg-3:        #1a2332;
  --bg-4:        #202a3a;
  --bg-5:        #2a3547;

  /* Primary Blue */
  --primary:     #4f8fff;
  --primary-dk:  #2b5fd6;
  --primary-lt:  #7ca8ff;
  --primary-glow: rgba(79,143,255,0.4);
  --primary-soft: rgba(79,143,255,0.08);

  /* Secondary Cyan */
  --cyan:        #00d9ff;
  --cyan-soft:   rgba(0,217,255,0.1);

  /* Status Green */
  --online:      #10d981;
  --online-soft: rgba(16,217,129,0.15);

  /* Danger Red */
  --danger:      #ff3860;
  --danger-soft: rgba(255,56,96,0.1);

  /* Text */
  --text-0:      #ffffff;
  --text-1:      #e5e9f0;
  --text-2:      #a8b5cc;
  --text-3:      #6b7a95;

  /* Borders */
  --border-dk:   rgba(79,143,255,0.08);
  --border-md:   rgba(79,143,255,0.15);
  --border-lt:   rgba(79,143,255,0.25);

  /* Shadows */
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.3);
  --shadow-md:   0 8px 24px rgba(0,0,0,0.4);
  --shadow-lg:   0 16px 48px rgba(0,0,0,0.5);
  --glow-primary: 0 0 24px rgba(79,143,255,0.4);

  /* Timing */
  --ease: cubic-bezier(0.4,0,0.2,1);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --t: 0.35s;
  --tf: 0.2s;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-0);
  color: var(--text-1);
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.2px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { 
  background: var(--primary); 
  border-radius: 3px; 
  opacity: 0.5;
  transition: opacity 0.2s;
}
::-webkit-scrollbar-thumb:hover { opacity: 0.8; }

/* =====================================================
   LAYOUT & APP SHELL
   ===================================================== */
.app {
  width: 100%; height: 100dvh;
  display: flex;
  background: var(--bg-0);
  position: relative;
  overflow: hidden;
}

/* Background: Premium gradient with subtle noise */
.app::before {
  content: '';
  position: fixed; inset: 0;
  background: 
    radial-gradient(circle at 20% 50%, rgba(79,143,255,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(0,217,255,0.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

/* =====================================================
   SIDEBAR - GLASS-MORPHISM PREMIUM
   ===================================================== */
.sidebar {
  width: 360px; min-width: 360px;
  height: 100%;
  display: flex; flex-direction: column;
  background: rgba(15,20,25,0.6);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--border-dk);
  position: relative; z-index: 10;
  transition: transform var(--t) var(--ease);
  box-shadow: inset 1px 0 0 rgba(79,143,255,0.1);
}

/* Top glow accent line */
.sidebar::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  opacity: 0.6;
}

/* ---- TOP PROFILE BAR ---- */
.top {
  padding: 20px 18px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border-dk);
  background: rgba(79,143,255,0.02);
}

.my-pic {
  width: 56px; height: 56px;
  border-radius: 16px;
  object-fit: cover;
  border: 2px solid var(--primary);
  background: var(--bg-4);
  cursor: pointer;
  transition: all var(--t) var(--spring);
  box-shadow: 0 4px 16px rgba(79,143,255,0.2), 0 0 0 0 var(--primary);
  flex-shrink: 0;
}

.my-pic:hover {
  transform: scale(1.08) translateY(-2px);
  box-shadow: 0 8px 24px rgba(79,143,255,0.35), 0 0 0 4px rgba(79,143,255,0.15);
}

.top-info { flex: 1; min-width: 0; }

.top-name {
  font-size: 15px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text-0);
  letter-spacing: 0.3px;
}

.top-status {
  display: block; margin-top: 4px;
  font-size: 12px; color: var(--text-3);
  cursor: pointer;
  transition: color var(--tf);
  font-weight: 500;
}

.top-status:hover { color: var(--primary); }

.btn-logout {
  padding: 8px 14px;
  border: 1px solid var(--danger-soft);
  border-radius: 10px;
  background: rgba(255,56,96,0.05);
  color: var(--danger);
  cursor: pointer; font-size: 11px;
  font-weight: 700; font-family: inherit;
  letter-spacing: 0.5px; text-transform: uppercase;
  transition: all var(--tf);
  margin-top: 8px;
}

.btn-logout:hover {
  background: rgba(255,56,96,0.12);
  border-color: var(--danger);
  box-shadow: 0 0 12px rgba(255,56,96,0.2);
  transform: translateY(-1px);
}

/* ---- SEARCH ---- */
.search-wrap {
  padding: 14px 14px;
  border-bottom: 1px solid var(--border-dk);
  background: transparent;
}

.search-wrap input {
  width: 100%; height: 44px;
  border: 1px solid var(--border-md);
  outline: none; padding: 0 16px;
  border-radius: 12px;
  background: rgba(26,35,50,0.8);
  backdrop-filter: blur(10px);
  color: var(--text-1);
  font-size: 14px; font-family: inherit;
  font-weight: 500;
  transition: all var(--t);
}

.search-wrap input::placeholder { color: var(--text-3); }

.search-wrap input:focus {
  border-color: var(--primary);
  background: rgba(79,143,255,0.05);
  box-shadow: 0 0 0 3px var(--primary-soft), 0 4px 12px rgba(79,143,255,0.15);
}

/* ---- USERS LIST ---- */
.users {
  flex: 1; overflow-y: auto;
  padding: 8px 0;
}

.user-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 12px;
  cursor: pointer;
  border-radius: 14px;
  margin: 3px 8px;
  transition: all var(--tf);
  position: relative;
  border: 1px solid transparent;
  group: "user-item";
}

.user-item:hover {
  background: rgba(79,143,255,0.06);
  border-color: var(--border-md);
  transform: translateX(3px);
}

.user-item.active {
  background: rgba(79,143,255,0.1);
  border-color: var(--primary);
  box-shadow: inset 0 0 12px rgba(79,143,255,0.1);
}

.user-avatar-wrap { position: relative; flex-shrink: 0; }

.user-avatar {
  width: 48px; height: 48px;
  border-radius: 12px; object-fit: cover;
  border: 1.5px solid var(--border-md);
  background: var(--bg-4);
  transition: border-color var(--tf);
}

.user-item.active .user-avatar,
.user-item:hover .user-avatar { border-color: var(--primary); }

.status-dot {
  position: absolute; bottom: -1px; right: -1px;
  width: 14px; height: 14px;
  border-radius: 50%; border: 2.5px solid var(--bg-1);
  background: var(--text-3); transition: all var(--t);
  box-shadow: 0 0 0 0 rgba(16,217,129,0);
}

.status-dot.online { 
  background: var(--online); 
  box-shadow: 0 0 10px rgba(16,217,129,0.6), inset 0 0 4px rgba(255,255,255,0.3);
}

.user-info { flex: 1; min-width: 0; }

.user-name {
  font-size: 13.5px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text-0);
  letter-spacing: 0.2px;
}

.user-preview {
  margin-top: 3px; font-size: 12px;
  color: var(--text-3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-weight: 400;
}

.user-meta {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 6px;
  flex-shrink: 0;
}

.user-time {
  font-size: 11px; color: var(--text-3);
  font-family: 'Syne', sans-serif;
  font-weight: 500;
}

.unread-badge {
  min-width: 24px; height: 24px;
  padding: 0 7px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-lt) 100%);
  color: var(--bg-0);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
  box-shadow: 0 4px 16px rgba(79,143,255,0.35);
  animation: badgePop 0.4s var(--spring);
  letter-spacing: 0.5px;
}

@keyframes badgePop {
  0% { transform: scale(0) rotate(-180deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.no-users {
  padding: 48px 20px; text-align: center;
  color: var(--text-3); font-size: 13px; font-weight: 500;
}

/* =====================================================
   CHAT AREA - PREMIUM
   ===================================================== */
.chat {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--bg-1);
  position: relative; z-index: 5;
  overflow: hidden;
}

/* ---- HEADER ---- */
.chat-header {
  height: 72px; min-height: 72px;
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  background: rgba(15,20,25,0.4);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-dk);
  z-index: 100; position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.chat-peer {
  display: flex; align-items: center; gap: 14px;
  flex: 1; min-width: 0; cursor: pointer;
  transition: opacity var(--tf);
}

.chat-peer:hover { opacity: 0.85; }

.chat-avatar-wrap { position: relative; flex-shrink: 0; }

.chat-avatar {
  width: 48px; height: 48px;
  border-radius: 13px; object-fit: cover;
  border: 2px solid var(--primary);
  box-shadow: 0 4px 16px rgba(79,143,255,0.25);
  transition: all var(--tf);
}

.chat-avatar:hover { transform: scale(1.05); }

.chat-status-dot {
  position: absolute; bottom: -2px; right: -2px;
  width: 14px; height: 14px;
  border-radius: 50%; border: 2.5px solid var(--bg-1);
  background: var(--text-3);
  box-shadow: 0 0 8px rgba(0,0,0,0.5);
}

.chat-status-dot.online { 
  background: var(--online); 
  box-shadow: 0 0 12px rgba(16,217,129,0.6);
}

.chat-peer-info { min-width: 0; }

.chat-peer-name {
  font-size: 15px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text-0);
  letter-spacing: 0.3px;
}

#status {
  margin-top: 3px; font-size: 12px;
  font-weight: 600; color: var(--text-3);
  transition: all var(--tf);
}

#status.online-status { color: var(--online); }

.header-actions { display: flex; gap: 10px; margin-left: auto; }

.hdr-btn {
  width: 44px; height: 44px;
  border: 1px solid var(--border-md);
  border-radius: 12px;
  background: rgba(26,35,50,0.5);
  backdrop-filter: blur(10px);
  color: var(--text-2);
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--tf);
}

.hdr-btn:hover {
  background: rgba(79,143,255,0.1);
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
  box-shadow: var(--glow-primary);
}

/* ---- MESSAGES AREA ---- */
.messages {
  flex: 1; overflow-y: auto;
  padding: 20px 28px;
  display: flex; flex-direction: column;
  gap: 14px;
  position: relative; z-index: 1;
}

.empty-chat {
  margin: auto; text-align: center;
  color: var(--text-3); font-size: 14px;
  animation: fadeIn 0.6s ease;
  display: flex; flex-direction: column;
  align-items: center; gap: 16px;
}

.empty-chat-icon {
  width: 80px; height: 80px;
  border-radius: 24px;
  background: rgba(79,143,255,0.06);
  border: 1.5px solid var(--border-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  box-shadow: 0 8px 24px rgba(79,143,255,0.1);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Date separator */
.date-sep {
  display: flex; align-items: center; gap: 12px;
  margin: 12px 0; opacity: 0.5;
}

.date-sep::before, .date-sep::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-md));
}

.date-sep::after { background: linear-gradient(90deg, var(--border-md), transparent); }

.date-sep span {
  font-size: 11px; color: var(--text-3);
  font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; white-space: nowrap;
  font-family: 'Syne', sans-serif;
}

/* ---- MESSAGE BUBBLES ---- */
.msg {
  max-width: min(62%, 540px);
  animation: msgIn 0.4s var(--spring);
  position: relative;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px) scale(0.94); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.msg-row {
  display: flex; align-items: flex-end; gap: 10px;
  width: 100%;
}

.msg.me { align-self: flex-end; }
.msg.them { align-self: flex-start; }
.msg.me .msg-row { flex-direction: row-reverse; }

.bubble {
  padding: 12px 16px;
  border-radius: 18px;
  position: relative;
  overflow: hidden;
  transition: all var(--tf);
  max-width: 100%;
  line-height: 1.5;
}

.msg.me .bubble {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dk) 100%);
  border-radius: 18px 6px 18px 18px;
  box-shadow: 0 6px 20px rgba(79,143,255,0.3);
  border: 1px solid rgba(79,143,255,0.3);
  color: white;
}

.msg.them .bubble {
  background: rgba(32,42,58,0.7);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-md);
  border-radius: 6px 18px 18px 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.msg.me .bubble:hover { 
  box-shadow: 0 8px 28px rgba(79,143,255,0.4);
  transform: translateY(-1px);
}

.msg.them .bubble:hover { 
  box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  transform: translateY(-1px);
  background: rgba(32,42,58,0.85);
}

.msg.me .bubble::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  animation: shimmer 4s ease-in-out infinite;
}

@keyframes shimmer {
  0% { left: -100%; }
  40%, 100% { left: 150%; }
}

.msg-text {
  font-size: 14px; line-height: 1.6;
  font-weight: 500; word-break: break-word;
  margin: 0;
}

.msg.them .msg-text { color: var(--text-1); }
.msg.me .msg-text { color: white; }

.msg-text a { 
  color: var(--cyan); 
  text-decoration: underline; 
  transition: opacity var(--tf);
}

.msg-text a:hover { opacity: 0.8; }

/* Reactions */
.msg-reactions {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 8px;
}

.reaction {
  padding: 4px 10px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px; font-size: 13px;
  cursor: pointer; transition: all var(--tf);
  display: flex; align-items: center; gap: 4px;
  backdrop-filter: blur(10px);
}

.reaction:hover { 
  background: rgba(255,255,255,0.16); 
  transform: scale(1.15) translateY(-2px);
}

.reaction.me-reacted { 
  background: rgba(79,143,255,0.25); 
  border-color: var(--primary);
}

.reaction-count { font-size: 11px; opacity: 0.7; font-weight: 700; }

/* Message meta */
.msg-meta {
  margin-top: 6px; font-size: 11px; opacity: 0.65;
  display: flex; align-items: center; gap: 6px;
  font-family: 'Syne', sans-serif;
  font-weight: 500;
}

.msg.me .msg-meta { justify-content: flex-end; color: rgba(255,255,255,0.7); }
.msg.them .msg-meta { justify-content: flex-start; color: var(--text-3); }

/* ---- TYPING ---- */
.typing-bar {
  min-height: 28px;
  padding: 0 28px 6px;
  font-size: 13px; color: var(--primary);
  font-style: italic; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
}

.t-dots { display: flex; gap: 3px; }

.t-dot {
  width: 7px; height: 7px;
  background: var(--primary); border-radius: 50%;
  animation: tBounce 1.4s ease-in-out infinite;
}

.t-dot:nth-child(2) { animation-delay: 0.2s; }
.t-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes tBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
  30% { transform: translateY(-8px); opacity: 1; }
}

/* ---- REPLY PREVIEW STRIP ---- */
.reply-strip {
  margin: 0 28px 10px;
  padding: 12px 14px;
  background: rgba(0,217,255,0.06);
  border: 1px solid rgba(0,217,255,0.2);
  border-left: 3px solid var(--cyan);
  border-radius: 12px;
  display: flex; align-items: center; gap: 12px;
  animation: stripIn 0.25s var(--spring);
  backdrop-filter: blur(10px);
}

@keyframes stripIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.reply-strip-info { flex: 1; min-width: 0; }

.reply-strip-author { 
  font-size: 11px; font-weight: 700; 
  color: var(--cyan); 
  margin-bottom: 3px; 
  letter-spacing: 0.4px;
  text-transform: uppercase;
}

.reply-strip-text { 
  font-size: 13px; color: var(--text-2); 
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
  font-weight: 500;
}

.reply-strip-close {
  background: none; border: none;
  color: var(--text-3); cursor: pointer; font-size: 18px;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; transition: all var(--tf); flex-shrink: 0;
}

.reply-strip-close:hover { 
  color: var(--danger); 
  background: rgba(255,56,96,0.1);
  transform: rotate(90deg);
}

/* ---- EDIT MODAL ---- */
.edit-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,14,23,0.7);
  backdrop-filter: blur(12px);
  display: none; align-items: center; justify-content: center;
  z-index: 950;
  animation: fadeIn 0.25s ease;
}

.edit-modal-overlay.active { display: flex; }

.edit-modal {
  background: rgba(21,27,39,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-md);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  max-width: 480px; width: 92%;
  padding: 28px;
  display: flex; flex-direction: column;
  gap: 18px;
  animation: modalPop 0.35s var(--spring);
  overflow: hidden;
}

@keyframes modalPop {
  from { opacity: 0; transform: scale(0.92) translateY(-20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.edit-modal-title { 
  font-size: 17px; font-weight: 700; 
  letter-spacing: 0.3px;
  color: var(--text-0);
}

.edit-modal textarea {
  width: 100%; min-height: 110px; max-height: 320px;
  border: 1px solid var(--border-md);
  outline: none; padding: 14px 16px;
  border-radius: 14px;
  background: rgba(26,35,50,0.6);
  color: var(--text-1);
  font-size: 14px; font-family: inherit; font-weight: 500;
  resize: vertical;
  transition: all var(--t);
  backdrop-filter: blur(10px);
}

.edit-modal textarea:focus {
  border-color: var(--primary);
  background: rgba(79,143,255,0.06);
  box-shadow: 0 0 0 3px var(--primary-soft), 0 4px 12px rgba(79,143,255,0.15);
}

.edit-modal-actions { display: flex; gap: 12px; justify-content: flex-end; }

.edit-btn {
  padding: 10px 22px; border: none; border-radius: 11px;
  cursor: pointer; font-size: 13px; font-weight: 700;
  font-family: inherit; letter-spacing: 0.4px;
  transition: all var(--t) var(--spring);
  text-transform: uppercase;
}

.edit-btn-cancel { 
  background: rgba(255,255,255,0.08); 
  color: var(--text-2); 
  border: 1px solid var(--border-md);
}

.edit-btn-cancel:hover {

<script>
const CLOUD_NAME = "doasf3d1u";
const UPLOAD_PRESET = "NeuroStack";

firebase.initializeApp({
  apiKey: "AIzaSyBczCrV1vpJB_0DTsbBDupTXQuEV7l5IDg",
  authDomain: "mel-odix.firebaseapp.com",
  projectId: "mel-odix",
  storageBucket: "mel-odix.firebasestorage.app",
  messagingSenderId: "217595352090",
  appId: "1:217595352090:web:56696fd53ae5bb59d2eda3"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let selectedUser = null;
let allUsersData = [];
let unreadMessages = {};
let mutedChats = {};
let favoritedChats = {};
let blockedUsers = {};
let messageRepliedTo = null;
let allMessages = [];
let currentPlayingAudio = null;
let mediaRecorder = null;
let audioChunks = [];
let recordingBlob = null;
let isRecording = false;
let recStart = 0;
let recTimer = null;
let editingMessageId = null;
let latestMsgTime = {};

auth.onAuthStateChanged(async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  currentUser = user;
  requestNotifPerm();
  await updateOnline(true);
  await loadProfile();
  startUsersListener();
  setupHeartbeat();
  loadUnreadCounts();
  listenIncoming();
  loadPrefs();
});

function requestNotifPerm() {
  if ("Notification" in window && Notification.permission === "default")
    Notification.requestPermission();
}

function showNotif(title, opts = {}) {
  if ("Notification" in window && Notification.permission === "granted")
    new Notification(title, { icon: "https://i.imgur.com/HeIi0wU.png", ...opts });
}

async function handleLogout() {
  if (!confirm("Logout?")) return;
  await updateOnline(false);
  await auth.signOut();
  window.location.href = "login.html";
}

async function loadProfile() {
  try {
    const doc = await db.collection("profiles").doc(currentUser.uid).get();
    const data = doc.data() || {};
    const name = data.displayName || currentUser.displayName || "User";
    const photo = data.photoUrl || currentUser.photoURL || "https://i.imgur.com/HeIi0wU.png";
    const bio = data.bio || "";

    document.getElementById("myName").textContent = name;
    document.getElementById("myPic").src = photo;
    document.getElementById("myStatus").textContent = bio || "Set status";

    await db.collection("users").doc(currentUser.uid).set({
      uid: currentUser.uid, name, displayName: name,
      email: data.email || currentUser.email,
      photoUrl: photo, photo, bio,
      createdAt: data.createdAt || Date.now(),
      updatedAt: Date.now()
    }, { merge: true });
  } catch(e){ console.error(e); }
}

document.getElementById("myPic").addEventListener("click", () =>
  document.getElementById("profileUpload").click());

document.getElementById("profileUpload").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = await uploadFile(file, "image");
  if (url) {
    await db.collection("users").doc(currentUser.uid).update({ photoUrl: url, photo: url, updatedAt: Date.now() });
    await db.collection("profiles").doc(currentUser.uid).update({ photoUrl: url, updatedAt: Date.now() });
    document.getElementById("myPic").src = url;
  }
});

function openBioModal() {
  alert("Status feature coming soon!");
}

let inactivityTimer = null;
let userStatus = "online";

async function updateOnline(on) {
  if (!currentUser) return;
  const status = on ? "online" : "offline";
  await db.collection("presence").doc(currentUser.uid).set(
    { online: on, status: status, lastSeen: Date.now(), uid: currentUser.uid }, { merge: true }
  );
  userStatus = status;
}

function setupHeartbeat() {
  setInterval(() => { if (currentUser) updateOnline(true); }, 5000);
  
  function resetInactivityTimer() {
    clearTimeout(inactivityTimer);
    if (userStatus === "away") {
      updateOnline(true);
    }
    inactivityTimer = setTimeout(async () => {
      if (currentUser) {
        userStatus = "away";
        await db.collection("presence").doc(currentUser.uid).set(
          { online: true, status: "away", lastSeen: Date.now(), uid: currentUser.uid }, { merge: true }
        );
      }
    }, 180000);
  }
  
  document.addEventListener("click", resetInactivityTimer);
  document.addEventListener("keypress", resetInactivityTimer);
  document.addEventListener("mousemove", resetInactivityTimer);
  document.addEventListener("touchstart", resetInactivityTimer);
  
  window.addEventListener("beforeunload", () => updateOnline(false));
  
  resetInactivityTimer();
}

function startUsersListener() {
  db.collection("users").onSnapshot(snap => {
    allUsersData = [];
    snap.forEach(doc => {
      if (doc.id !== currentUser.uid) {
        const d = doc.data();
        allUsersData.push({ uid: doc.id, ...d, photo: d.photoUrl || d.photo || "https://i.imgur.com/HeIi0wU.png" });
      }
    });
    renderUsers();
  });
}

function renderUsers() {
  const box = document.getElementById("users");
  box.innerHTML = "";

  const q = document.getElementById("userSearch").value.trim().toLowerCase();
  let list = allUsersData.filter(u => !blockedUsers[u.uid]);
  if (q) list = list.filter(u => (u.displayName || u.name || "").toLowerCase().includes(q));

  list.sort((a, b) => {
    if (favoritedChats[a.uid] && !favoritedChats[b.uid]) return -1;
    if (!favoritedChats[a.uid] && favoritedChats[b.uid]) return 1;
    const ta = latestMsgTime[a.uid] || 0;
    const tb = latestMsgTime[b.uid] || 0;
    return tb - ta;
  });

  if (!list.length) {
    box.innerHTML = '<div class="no-users">👋 No users found</div>';
    return;
  }

  list.forEach(user => {
    const name = user.displayName || user.name || "User";
    const photo = user.photoUrl || user.photo || "https://i.imgur.com/HeIi0wU.png";
    const el = document.createElement("div");
    el.className = "user-item";
    el.dataset.uid = user.uid;
    if (selectedUser?.uid === user.uid) el.classList.add("active");

    const unread = unreadMessages[user.uid] || 0;
    const t = latestMsgTime[user.uid];
    const timeStr = t ? formatTime(t) : "";

    el.innerHTML = `
      <div class="user-avatar-wrap">
        <img src="${photo}" class="user-avatar" onerror="this.src='https://i.imgur.com/HeIi0wU.png'">
        <div class="status-dot" id="dot-${user.uid}"></div>
      </div>
      <div class="user-info">
        <div class="user-name">${favoritedChats[user.uid] ? '⭐ ' : ''}${name}</div>
        <div class="user-preview" id="prev-${user.uid}">${user.bio || 'Tap to chat'}</div>
      </div>
      <div class="user-meta">
        ${timeStr ? `<div class="user-time">${timeStr}</div>` : ''}
        ${unread > 0 ? `<div class="unread-badge">${unread > 99 ? '99+' : unread}</div>` : ''}
      </div>
    `;

    db.collection("presence").doc(user.uid).onSnapshot(doc => {
      const dot = document.getElementById(`dot-${user.uid}`);
      if (dot) dot.classList.toggle("online", !!doc.data()?.online);
    });

    el.addEventListener("click", () => selectChat(user, el));
    box.appendChild(el);
  });
}

function searchUsers() { renderUsers(); }

function selectChat(user, el) {
  selectedUser = user;
  messageRepliedTo = null;
  clearReply();

  document.getElementById("chatName").textContent = user.displayName || user.name || "User";
  document.getElementById("chatPic").src = user.photoUrl || user.photo || "https://i.imgur.com/HeIi0wU.png";

  document.querySelectorAll(".user-item").forEach(e => e.classList.remove("active"));
  if (el) el.classList.add("active");

  markRead(user.uid);
  delete unreadMessages[user.uid];
  renderUsers();
  loadMessages();
  listenPresence();
  listenTyping();
  document.getElementById("typingBar").innerHTML = "";

  if (window.innerWidth <= 768) toggleSidebar();
}

function markRead(fromUid) {
  db.collection("chats")
    .where("to", "==", currentUser.uid)
    .where("from", "==", fromUid)
    .where("read", "==", false)
    .get().then(snap => snap.forEach(d =>
      db.collection("chats").doc(d.id).update({ read: true, readAt: Date.now() })
    ));
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hide");
}

function listenPresence() {
  if (!selectedUser) return;
  db.collection("presence").doc(selectedUser.uid).onSnapshot(doc => {
    const data = doc.data() || {};
    const isOnline = data.online === true;
    const status = data.status || (isOnline ? "online" : "offline");
    const lastSeen = data.lastSeen || 0;
    
    const el = document.getElementById("status");
    const dot = document.getElementById("chatStatusDot");
    
    let statusText = "";
    if (isOnline && status === "online") {
      statusText = "🟢 online";
      dot.classList.add("online");
    } else if (isOnline && status === "away") {
      statusText = "🟡 away";
      dot.classList.remove("online");
    } else {
      const lastSeenText = lastSeen ? formatLastSeen(lastSeen) : "a while ago";
      statusText = `⚪ offline • last seen ${lastSeenText}`;
      dot.classList.remove("online");
    }
    
    el.textContent = statusText;
    el.className = (isOnline && status === "online") ? "online-status" : "";
  });
}

function formatLastSeen(timestamp) {
  if (!timestamp) return "a while ago";
  const now = Date.now();
  const diff = now - timestamp;
  const seconds = Math.floor(diff / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  
  if (minutes < 1) return "just now";
  if (minutes < 60) return `${minutes}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days === 1) return "yesterday";
  return `${days}d ago`;
}

let typingTimeout;
document.addEventListener("input", function(e) {
  if (e.target.id !== "text" || !selectedUser) return;
  
  const textArea = document.getElementById("text");

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() =>
    db.collection("typing").doc(currentUser.uid).set({ typing: false }, { merge: true }), 1200);
});

function listenTyping() {

  db.collection("typing").doc(selectedUser.uid).onSnapshot(doc => {
    const bar = document.getElementById("typingBar");

    if (data?.typing && data.to === currentUser.uid) {

    } else {

function loadUnreadCounts() {
  db.collection("chats")
    .where("to", "==", currentUser.uid)
    .where("read", "==", false)
    .onSnapshot(snap => {
      unreadMessages = {};
      snap.forEach(doc => {
        const from = doc.data().from;
        unreadMessages[from] = (unreadMessages[from] || 0) + 1;
      });
      renderUsers();
    });

function loadMessages() {
  if (!selectedUser) return;

  db.collection("chats").orderBy("createdAt", "asc").onSnapshot(snap => {
    const box = document.getElementById("messages");
    box.innerHTML = "";
    allMessages = [];

    let maxTime = latestMsgTime[selectedUser.uid] || 0;
    let lastDate = null;

    snap.forEach(doc => {
      const msg = doc.data();
      const fromMe = msg.from === currentUser.uid;
      const fromThem = msg.from === selectedUser.uid && msg.to === currentUser.uid;
      if (!((fromMe && msg.to === selectedUser.uid) || fromThem)) return;

      allMessages.push({ id: doc.id, ...msg });

      if (msg.createdAt > maxTime) {
        maxTime = msg.createdAt;
      }

      if (msg.to === currentUser.uid && !msg.read)
        db.collection("chats").doc(doc.id).update({ read: true, readAt: Date.now() });

      const dateStr = new Date(msg.createdAt).toLocaleDateString();
      if (dateStr !== lastDate) {
        const sep = document.createElement("div");
        sep.className = "date-sep";
        sep.innerHTML = `<span>${fmtDateSep(msg.createdAt)}</span>`;
        box.appendChild(sep);
        lastDate = dateStr;
      }

      box.appendChild(buildMessage(doc.id, msg, fromMe));
    });

    if (maxTime > (latestMsgTime[selectedUser.uid] || 0)) {
      latestMsgTime[selectedUser.uid] = maxTime;
    }

    box.scrollTop = box.scrollHeight;

    if (allMessages.length) {
      const last = allMessages[allMessages.length - 1];
      const prevEl = document.getElementById(`prev-${selectedUser.uid}`);
      if (prevEl) {
        const preview = last.text || (last.image ? "📷 Photo" : last.audio ? "🎤 Voice" : "📎 File");
        prevEl.textContent = (last.from === currentUser.uid ? "You: " : "") + preview;
      }
    }

    renderUsers();
  });
}

function buildMessage(id, msg, fromMe) {
  const el = document.createElement("div");
  el.className = `msg ${fromMe ? "me" : "them"}`;
  el.dataset.msgId = id;

  const row = document.createElement("div");
  row.className = "msg-row";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  let inner = "";

  if (msg.replyTo) {
    inner += `<div class="reply-quote" onclick="scrollToMsg('${msg.replyTo}')">
      <div class="reply-quote-author">${msg.replyToAuthor || "User"}</div>
      <div class="reply-quote-text">${msg.replyToText || "(attachment)"}</div>
    </div>`;
  }

  if (msg.text) inner += `<div class="msg-text">${linkify(msg.text)}</div>`;
  if (msg.image) inner += `<img src="${msg.image}" class="msg-img" onclick="viewImg('${msg.image}')" onerror="this.style.display='none'" style="max-width:240px;margin-top:8px;border-radius:12px;cursor:pointer;">`;
  
  if (msg.reactions && Object.keys(msg.reactions).length) {
    inner += '<div class="msg-reactions">';
    for (const [emoji, users] of Object.entries(msg.reactions)) {
      const mine = users.includes(currentUser.uid);
      inner += `<div class="reaction${mine?' me-reacted':''}" onclick="toggleReact('${id}','${emoji}')">
        ${emoji}<span class="reaction-count">${users.length}</span>
      </div>`;
    }
    inner += '</div>';
  }

  const tick = fromMe && msg.read ? "✓✓" : fromMe ? "✓" : "";
  const editLabel = msg.edited ? ' <span style="font-size:10px;opacity:0.6;font-style:italic;">(edited)</span>' : '';
  inner += `<div class="msg-meta"><span>${formatTime(msg.createdAt)}</span>${tick ? `<span>${tick}</span>` : ""}${editLabel}</div>`;

  bubble.innerHTML = inner;
  row.appendChild(bubble);
  el.appendChild(row);

  el.addEventListener("contextmenu", e => {
    e.preventDefault();
    showCtxMenu(e, id, msg);
  });

  return el;
}

function scrollToMsg(msgId) {
  const el = document.querySelector(`[data-msg-id="${msgId}"]`);
  if (el) {
    el.scrollIntoView({ behavior: "smooth", block: "center" });
    el.style.outline = "2px solid var(--cyan)";
    el.style.borderRadius = "14px";
    setTimeout(() => { el.style.outline = ""; el.style.borderRadius = ""; }, 1500);
  }
}

function replyMsg(msgId) {

  messageRepliedTo = msg;

    <div class="reply-strip">

}

}

function startEdit(msgId) {

  db.collection("chats").doc(editingMessageId).update({

  }).then(() => {

function showCtxMenu(e, id, msg) {
  const menu = document.getElementById("ctxMenu");
  const fromMe = msg.from === currentUser.uid;
  menu.innerHTML = `
    <div class="ctx-item" onclick="replyMsg('${id}')">↩ Reply</div>
    ${msg.text ? `<div class="ctx-item" onclick="copyMsg('${(msg.text||'').replace(/'/g,"\\'")}')">📋 Copy</div>` : ''}
    ${fromMe && msg.text ? `<div class="ctx-item" onclick="startEdit('${id}')">✏️ Edit</div>` : ''}
    ${fromMe ? `<div class="ctx-item danger" onclick="deleteMsg('${id}')">🗑️ Delete</div>` : ''}
  `;
  menu.classList.add("active");
  const x = e.clientX, y = e.clientY;
  menu.style.top = Math.min(y, window.innerHeight - 180) + "px";
  menu.style.left = Math.min(x, window.innerWidth - 200) + "px";
  setTimeout(() => document.addEventListener("click", closeCtxMenu, { once: true }), 0);
}

function closeCtxMenu() {
  document.getElementById("ctxMenu").classList.remove("active");
}

function copyMsg(t) { navigator.clipboard.writeText(t); closeCtxMenu(); }

function deleteMsg(id) {
  if (confirm("Delete this message?")) db.collection("chats").doc(id).delete();
  closeCtxMenu();
}

async function toggleReact(msgId, emoji) {
  const msg = allMessages.find(m => m.id === msgId);
  if (!msg) return;
  const r = { ...(msg.reactions || {}) };
  r[emoji] = r[emoji] ? [...r[emoji]] : [];
  const i = r[emoji].indexOf(currentUser.uid);
  if (i > -1) { r[emoji].splice(i,1); if (!r[emoji].length) delete r[emoji]; }
  else r[emoji].push(currentUser.uid);
  await db.collection("chats").doc(msgId).update({ reactions: r });
}

async function uploadFile(file, type) {
  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${type}/upload`, { method: "POST", body: form });
  const data = await res.json();
  if (!res.ok || !data.secure_url) throw new Error(data.error?.message || "Upload failed");
  return data.secure_url;
}

const recordBtn = document.getElementById("recordBtn");
const voicePanel = document.getElementById("voicePanel");
const voiceTimerEl = document.getElementById("voiceTimer");

recordBtn.addEventListener("mousedown", startRec);
recordBtn.addEventListener("touchstart", startRec);
document.addEventListener("mouseup", stopRec);
document.addEventListener("touchend", stopRec);

async function startRec(e) {
  if (isRecording || !selectedUser) { if (!selectedUser) alert("Select a user first"); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.addEventListener("dataavailable", e => audioChunks.push(e.data));
    mediaRecorder.addEventListener("stop", () => {
      recordingBlob = new Blob(audioChunks, { type: "audio/webm" });
    });
    mediaRecorder.start();
    isRecording = true;
    recStart = Date.now();
    recordBtn.classList.add("active");
    voicePanel.classList.add("active");
    recTimer = setInterval(() => {
      const s = Math.floor((Date.now() - recStart) / 1000);
      voiceTimerEl.textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;
    }, 200);
  } catch(e) { alert("Microphone access denied"); }
}

function stopRec() {
  if (!isRecording) return;
  if (mediaRecorder?.state === "recording") {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  isRecording = false;
  recordBtn.classList.remove("active");
  clearInterval(recTimer);
}

async function sendVoice() {
  if (!recordingBlob || !selectedUser) return;
  const btn = document.getElementById("vSendBtn");
  btn.disabled = true;
  btn.textContent = "Uploading…";
  try {
    const f = new File([recordingBlob], "voice.webm", { type: "audio/webm" });
    const url = await uploadFile(f, "auto");
    if (url) {
      await db.collection("chats").add(baseMsg({ audio: url, duration: Date.now() - recStart }));
      cancelVoice();
    }
  } catch(e) { alert("Failed: " + e.message); }
  btn.disabled = false;
  btn.textContent = "✓ Send";
}

function cancelVoice() {
  recordingBlob = null;
  audioChunks = [];
  voicePanel.classList.remove("active");
  voiceTimerEl.textContent = "0:00";
}

function listenIncoming() {
  db.collection("chats")
    .where("to", "==", currentUser.uid)
    .where("status", "==", "sent")
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if (change.type !== "added") return;
        const msg = change.doc.data();
        const uid = msg.from;
        if (blockedUsers[uid]) return;

        if (!latestMsgTime[uid] || msg.createdAt > latestMsgTime[uid]) {
          latestMsgTime[uid] = msg.createdAt;
        }

        if (!selectedUser || selectedUser.uid !== uid) {
          if (!mutedChats[uid]) {
            db.collection("users").doc(uid).get().then(d => {
              const name = d.data()?.displayName || "User";
              const body = msg.text || (msg.image ? "📷 Photo" : msg.audio ? "🎤 Voice" : "New message");
              showNotif(name, { body, tag: `chat-${uid}` });
            });
          }
        }
        db.collection("chats").doc(change.doc.id).update({ status: "delivered" });
        renderUsers();
      });
    });
}

  }));
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
}

function fmtDateSep(ts) {
  const d = new Date(ts), t = new Date(), y = new Date(t);
  y.setDate(t.getDate() - 1);
  if (d.toDateString() === t.toDateString()) return "Today";
  if (d.toDateString() === y.toDateString()) return "Yesterday";
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function linkify(t) {
  return t.replace(/(\b(https?:\/\/|www\.)[^\s]+)/gi, url => {
    const h = url.match(/^https?:\/\//) ? url : "http://" + url;
    return `<a href="${h}" target="_blank">${url}</a>`;
  });
}
</script>
