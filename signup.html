<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexa Sign Up</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: var(--font-body);
      background: radial-gradient(circle at top left, rgba(0, 240, 255, 0.15), transparent 40%),
                  radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.12), transparent 40%),
                  #070b19;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(13, 18, 41, 0.75);
      padding: 3rem 2.5rem;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(0, 240, 255, 0.2);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 240, 255, 0.1);
      animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h2 {
      font-family: var(--font-display);
      text-align: center;
      color: #ffffff;
      margin-bottom: 2rem;
      font-size: var(--text-3xl);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff, #00f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }

    .input-group {
      position: relative;
      margin-bottom: 1.2rem;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1.5px solid rgba(79, 143, 255, 0.15);
      background: rgba(10, 14, 39, 0.6);
      color: #fff;
      font-size: var(--text-base);
      font-weight: 500;
      transition: all var(--transition-base);
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: var(--color-primary);
      background: rgba(10, 14, 39, 0.8);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.25), inset 0 0 8px rgba(0, 240, 255, 0.1);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: var(--text-tertiary);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--color-primary), var(--color-tertiary));
      color: #070b19;
      font-weight: 700;
      font-size: var(--text-base);
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all var(--transition-base);
      box-shadow: 0 6px 20px rgba(0, 240, 255, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 240, 255, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .login-link a {
      color: var(--color-primary);
      font-weight: 600;
      text-decoration: none;
    }

    .login-link a:hover {
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
    }

    .msg {
      text-align: center;
      margin-top: 15px;
      font-size: var(--text-sm);
      font-weight: 600;
      min-height: 20px;
    }

    .error { color: #ff5252; text-shadow: 0 0 8px rgba(255, 82, 82, 0.2); }
    .success { color: #00e676; text-shadow: 0 0 8px rgba(0, 230, 118, 0.2); }
  </style>
</head>

<body>

<div class="card">

  <h2>Create Account</h2>

  <div class="input-group">
    <input id="username" placeholder="Username">
  </div>
  
  <div class="input-group">
    <input id="displayName" placeholder="Display Name">
  </div>
  
  <div class="input-group">
    <input id="email" placeholder="Email Address">
  </div>
  
  <div class="input-group">
    <input id="password" type="password" placeholder="Password">
  </div>

  <button id="signupBtn">Sign Up</button>

  <div class="login-link">
    Already have an account? <a href="login.html">Login</a>
  </div>

  <p id="msg" class="msg"></p>

</div>

<script type="module">

// 🔥 Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBczCrV1vpJB_0DTsbBDupTXQuEV7l5IDg",
  authDomain: "mel-odix.firebaseapp.com",
  projectId: "mel-odix",
  storageBucket: "mel-odix.firebasestorage.app",
  messagingSenderId: "217595352090",
  appId: "1:217595352090:web:56696fd53ae5bb59d2eda3"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// UI
const msg = document.getElementById("msg");
const btn = document.getElementById("signupBtn");

btn.addEventListener("click", signup);

async function signup() {

  const username = document.getElementById("username").value.trim();
  const displayName = document.getElementById("displayName").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!username || !displayName || !email || !password) {
    showMsg("Please fill all fields", "error");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Creating account...";

  try {

    // 🔐 CREATE USER
    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    const user = userCredential.user;

    // 🗄️ SAVE PROFILE
    await setDoc(doc(db, "users", user.uid), {
      username,
      displayName,
      email,
      createdAt: Date.now()
    });

    // ✅ SUCCESS POPUP
    showPopup("Account created successfully 🚀");

    showMsg("Success! Redirecting...", "success");

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (error) {
    showMsg(error.message, "error");
  }

  btn.disabled = false;
  btn.innerText = "Sign Up";
}

// MESSAGE
function showMsg(text, type) {
  msg.textContent = text;
  msg.className = "msg " + type;
}

// POPUP
function showPopup(text) {
  const popup = document.createElement("div");

  popup.innerText = text;

  popup.style.position = "fixed";
  popup.style.top = "20px";
  popup.style.left = "50%";
  popup.style.transform = "translateX(-50%)";
  popup.style.background = "#00f0ff";
  popup.style.color = "#000";
  popup.style.padding = "12px 20px";
  popup.style.borderRadius = "10px";
  popup.style.fontWeight = "bold";
  popup.style.zIndex = "9999";

  document.body.appendChild(popup);

  setTimeout(() => popup.remove(), 1500);
}

</script>

</body>
</html>
